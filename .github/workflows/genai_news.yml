name: Generate GenAI News Report

on:
  schedule:
    - cron: '0 8 * * *' # Run at 8:00 AM UTC every day
  workflow_dispatch: # Allow manual triggering from GitHub UI

permissions:
  contents: write # Needed to push new reports to the repo

jobs:
  generate_report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        working-directory: './Gen AI News Agent'
        run: pip install -r requirements.txt
        
      - name: Run News Fetcher
        working-directory: './Gen AI News Agent'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python main.py
        
      - name: Commit and Push Report
        working-directory: './Gen AI News Agent'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/ state/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-generate GenAI News Report and State" && git push)
