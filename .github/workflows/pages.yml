name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Gen AI News Agent/reports/**'
      - 'site-src/**'
      - 'portfolio-src/**'
      - 'build.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Site
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true
