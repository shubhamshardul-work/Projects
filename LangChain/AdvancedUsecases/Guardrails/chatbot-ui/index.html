<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardrails Support Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <h1>Guardrails Support</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span> Online
            </div>
        </header>

        <main id="chat-history">
            <div class="message assistant">
                <div class="message-content">
                    Hello! I'm your Guardrails Support Assistant. How can I help you today?
                </div>
                <div class="message-time">Just now</div>
            </div>
        </main>

        <section id="approval-modal" class="modal hidden">
            <div class="modal-content">
                <h3>⚠️ Action Required</h3>
                <p id="approval-text">This action requires a supervisor's approval.</p>
                <div class="modal-actions">
                    <button id="reject-btn" class="btn secondary">Cancel</button>
                    <button id="approve-btn" class="btn primary">Approve</button>
                </div>
            </div>
        </section>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"></path>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="app.js"></script>
</body>

</html>
