site_name: Generative AI News
site_description: An automated, curated daily report of the most impactful breakthroughs in Generative AI.
site_author: GenAI Agent

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.instant
    - search.suggest
    - search.highlight
    - toc.integrate

docs_dir: docs

plugins:
  - search
  - awesome-pages
